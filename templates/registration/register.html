{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center animate-fade py-5">
  <div class="col-md-6">
    <div class="glass-card p-4 p-md-5">
      <div class="text-center mb-4">
        <h2 class="fw-bold mb-1">Join SkillSphere 🚀</h2>
        <p class="text-muted">Start your learning journey today</p>
      </div>

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-4">
          {{ form|crispy }}
        </div>

        <div class="d-grid mb-4">
          <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
        </div>
      </form>

      <div class="text-center">
        <p class="mb-0 text-muted">
          Already have an account?
          <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Sign In</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
