{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center animate-fade py-5">
  <div class="col-md-5">
    <div class="glass-card p-4 p-md-5">
      <div class="text-center mb-4">
        <h2 class="fw-bold mb-1">Welcome Back 🧠</h2>
        <p class="text-muted">Sign in to your SkillSphere account</p>
      </div>

      <form method="post" class="mt-3" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control border-start-0" id="username" placeholder="Enter username" required>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control border-start-0" id="password" placeholder="Enter password" required>
          </div>
        </div>

        <div class="d-grid mb-4">
          <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
        </div>
      </form>

      <div class="text-center">
        <p class="mb-0 text-muted">
          Don't have an account?
          <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Create Account</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
